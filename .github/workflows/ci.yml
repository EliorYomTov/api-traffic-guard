name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:

  # ── Backend ────────────────────────────────────────────────────────────────
  backend:
    name: Backend — Build & Test
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_DB:       trafficguard
          POSTGRES_USER:     trafficguard
          POSTGRES_PASSWORD: trafficguard_dev_password
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U trafficguard"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

      redis:
        image: redis:7
        ports:
          - 6379:6379
        options: >-
          --health-cmd="redis-cli ping"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      - name: Build & run tests
        run: ./mvnw verify -B
        env:
          SPRING_DATASOURCE_URL:      jdbc:postgresql://localhost:5432/trafficguard
          SPRING_DATASOURCE_USERNAME: trafficguard
          SPRING_DATASOURCE_PASSWORD: trafficguard_dev_password
          SPRING_DATA_REDIS_HOST:     localhost
          SPRING_DATA_REDIS_PORT:     6379
          APP_JWT_SECRET:             404E635266556A586E3272357538782F413F4428472B4B6250645367566B5970
          APP_JWT_EXPIRATION:         86400000

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: backend-test-results
          path: target/surefire-reports/

  # ── Frontend ───────────────────────────────────────────────────────────────
  frontend:
    name: Frontend — Build & Type-check
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: frontend

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Type-check
        run: npx tsc --noEmit

      - name: Build
        run: npm run build